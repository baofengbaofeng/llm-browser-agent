name: 自动解压 ZIP 文件
on:
  push:
    paths:
      - '**.zip'  # 只要上传 .zip 文件就触发
  workflow_dispatch:  # 支持手动触发

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 关键：允许自动提交代码
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 查找并解压 ZIP 文件
        run: |
          # 查找仓库里的第一个 zip 文件
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "未找到 ZIP 文件，退出"
            exit 0
          fi
          
          echo "找到 ZIP 文件: $ZIP_FILE"
          
          # 解压到当前目录（覆盖现有文件）
          unzip -o "$ZIP_FILE" -d .
          
          # 删除 zip 文件（避免重复解压）
          rm -f "$ZIP_FILE"

      - name: 提交并推送解压后的代码
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "自动解压 ZIP 文件并更新源码"
          git push
